<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" fill="#E8FAFA"/>
  <!-- Book shape -->
  <g transform="translate(200,180)">
    <!-- Left page -->
    <path d="M-8,-60 Q-8,-65 -13,-65 L-80,-65 Q-90,-65 -90,-55 L-90,55 Q-90,65 -80,65 L-13,65 Q-8,65 -8,60 Z" fill="white" stroke="#1a1a2e" stroke-width="2.5"/>
    <!-- Right page -->
    <path d="M8,-60 Q8,-65 13,-65 L80,-65 Q90,-65 90,-55 L90,55 Q90,65 80,65 L13,65 Q8,65 8,60 Z" fill="white" stroke="#1a1a2e" stroke-width="2.5"/>
    <!-- Spine -->
    <path d="M-8,-65 Q0,-70 8,-65 L8,65 Q0,70 -8,65 Z" fill="#f0f0f0" stroke="#1a1a2e" stroke-width="2"/>
    <!-- Text lines left -->
    <line x1="-72" y1="-40" x2="-20" y2="-40" stroke="#ccc" stroke-width="3" stroke-linecap="round"/>
    <line x1="-72" y1="-25" x2="-25" y2="-25" stroke="#ccc" stroke-width="3" stroke-linecap="round"/>
    <line x1="-72" y1="-10" x2="-30" y2="-10" stroke="#ccc" stroke-width="3" stroke-linecap="round"/>
    <line x1="-72" y1="5" x2="-22" y2="5" stroke="#ccc" stroke-width="3" stroke-linecap="round"/>
    <line x1="-72" y1="20" x2="-35" y2="20" stroke="#ccc" stroke-width="3" stroke-linecap="round"/>
    <line x1="-72" y1="35" x2="-28" y2="35" stroke="#ccc" stroke-width="3" stroke-linecap="round"/>
    <!-- Text lines right -->
    <line x1="20" y1="-40" x2="72" y2="-40" stroke="#ccc" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="-25" x2="65" y2="-25" stroke="#ccc" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="-10" x2="70" y2="-10" stroke="#ccc" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="5" x2="60" y2="5" stroke="#ccc" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="20" x2="72" y2="20" stroke="#ccc" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="35" x2="55" y2="35" stroke="#ccc" stroke-width="3" stroke-linecap="round"/>
    <!-- Comment bubbles (social reading) -->
    <g transform="translate(55,-35)">
      <rect x="0" y="0" width="32" height="18" rx="9" fill="#FF2D55" opacity="0.9"/>
      <circle cx="10" cy="9" r="3" fill="white"/>
      <circle cx="20" cy="9" r="3" fill="white"/>
    </g>
    <g transform="translate(-75,10)">
      <rect x="0" y="0" width="26" height="18" rx="9" fill="#00D4D4" opacity="0.85"/>
      <text x="13" y="13" text-anchor="middle" font-size="9" fill="white" font-family="sans-serif">+1</text>
    </g>
  </g>
  <!-- TikTok-style cursor/bookmark -->
  <g transform="translate(200,108)">
    <rect x="-6" y="0" width="12" height="28" rx="3" fill="#FF2D55" opacity="0.2"/>
    <circle cx="0" cy="2" r="4" fill="#FF2D55"/>
    <circle cx="0" cy="26" r="4" fill="#FF2D55"/>
    <line x1="0" y1="6" x2="0" y2="22" stroke="#FF2D55" stroke-width="2"/>
  </g>
  <!-- WE-READER text -->
  <text x="200" y="310" text-anchor="middle" font-family="monospace" font-size="22" font-weight="700" fill="#1a1a2e" letter-spacing="4">WE-READER</text>
  <text x="200" y="332" text-anchor="middle" font-family="monospace" font-size="11" fill="#666" letter-spacing="2">TIKTOK BOOKS</text>
</svg>
