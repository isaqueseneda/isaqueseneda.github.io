<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8FAFA"/>
      <stop offset="100%" stop-color="#d0f0f0"/>
    </linearGradient>
    <filter id="phoneshadow">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <clipPath id="screenclip">
      <rect x="-120" y="-220" width="240" height="440" rx="8"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Decorative dots pattern -->
  <g opacity="0.06">
    <circle cx="100" cy="100" r="3" fill="#1a1a2e"/>
    <circle cx="160" cy="100" r="3" fill="#1a1a2e"/>
    <circle cx="220" cy="100" r="3" fill="#1a1a2e"/>
    <circle cx="100" cy="160" r="3" fill="#1a1a2e"/>
    <circle cx="160" cy="160" r="3" fill="#1a1a2e"/>
    <circle cx="1000" cy="600" r="3" fill="#1a1a2e"/>
    <circle cx="1060" cy="600" r="3" fill="#1a1a2e"/>
    <circle cx="1120" cy="600" r="3" fill="#1a1a2e"/>
    <circle cx="1000" cy="660" r="3" fill="#1a1a2e"/>
    <circle cx="1060" cy="660" r="3" fill="#1a1a2e"/>
  </g>

  <!-- Phone 1 (center, main) -->
  <g transform="translate(600, 350)" filter="url(#phoneshadow)">
    <!-- Phone body -->
    <rect x="-135" y="-245" width="270" height="490" rx="28" fill="#1a1a2e"/>
    <!-- Screen -->
    <rect x="-120" y="-220" width="240" height="440" rx="8" fill="white"/>

    <!-- Screen content - book reading interface -->
    <g clip-path="url(#screenclip)">
      <!-- Status bar -->
      <rect x="-120" y="-220" width="240" height="30" fill="#f8f8f8"/>
      <text x="-100" y="-200" font-family="sans-serif" font-size="9" fill="#999">9:41</text>

      <!-- Book header -->
      <rect x="-120" y="-190" width="240" height="40" fill="#FF2D55" opacity="0.1"/>
      <text x="0" y="-168" text-anchor="middle" font-family="serif" font-size="11" font-weight="700" fill="#1a1a2e">The Great Gatsby</text>
      <text x="0" y="-156" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#999">Chapter 3 · 847 reading now</text>

      <!-- Text lines (book content) -->
      <line x1="-95" y1="-130" x2="95" y2="-130" stroke="#ddd" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-95" y1="-115" x2="80" y2="-115" stroke="#ddd" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-95" y1="-100" x2="90" y2="-100" stroke="#ddd" stroke-width="2.5" stroke-linecap="round"/>

      <!-- Highlighted passage -->
      <rect x="-95" y="-92" width="170" height="16" rx="2" fill="#FF2D55" opacity="0.12"/>
      <line x1="-95" y1="-85" x2="70" y2="-85" stroke="#FF2D55" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>

      <line x1="-95" y1="-70" x2="85" y2="-70" stroke="#ddd" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-95" y1="-55" x2="60" y2="-55" stroke="#ddd" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-95" y1="-40" x2="95" y2="-40" stroke="#ddd" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-95" y1="-25" x2="75" y2="-25" stroke="#ddd" stroke-width="2.5" stroke-linecap="round"/>

      <!-- Another highlighted passage -->
      <rect x="-95" y="-17" width="140" height="16" rx="2" fill="#00D4D4" opacity="0.12"/>
      <line x1="-95" y1="-10" x2="40" y2="-10" stroke="#00D4D4" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>

      <line x1="-95" y1="5" x2="90" y2="5" stroke="#ddd" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-95" y1="20" x2="65" y2="20" stroke="#ddd" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-95" y1="35" x2="80" y2="35" stroke="#ddd" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-95" y1="50" x2="95" y2="50" stroke="#ddd" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-95" y1="65" x2="70" y2="65" stroke="#ddd" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-95" y1="80" x2="85" y2="80" stroke="#ddd" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-95" y1="95" x2="50" y2="95" stroke="#ddd" stroke-width="2.5" stroke-linecap="round"/>

      <!-- Social reaction bubbles popping in -->
      <g transform="translate(70, -85)">
        <rect x="0" y="-12" width="40" height="22" rx="11" fill="#FF2D55">
          <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite"/>
        </rect>
        <text x="12" y="3" font-family="sans-serif" font-size="9" fill="white">
          <tspan>12</tspan>
        </text>
        <text x="30" y="3" font-size="9">
          <tspan>🔥</tspan>
        </text>
      </g>

      <g transform="translate(45, -10)">
        <rect x="0" y="-12" width="52" height="22" rx="11" fill="#00D4D4">
          <animate attributeName="opacity" values="1;1;0;1" dur="5s" repeatCount="indefinite"/>
        </rect>
        <text x="10" y="3" font-family="sans-serif" font-size="8" fill="white">"same"</text>
      </g>

      <!-- Bottom nav bar -->
      <rect x="-120" y="170" width="240" height="50" fill="#fafafa"/>
      <line x1="-120" y1="170" x2="120" y2="170" stroke="#eee" stroke-width="1"/>
      <!-- Nav icons -->
      <rect x="-80" y="182" width="16" height="16" rx="3" fill="#ccc"/>
      <rect x="-8" y="182" width="16" height="16" rx="3" fill="#FF2D55"/>
      <rect x="64" y="182" width="16" height="16" rx="3" fill="#ccc"/>
    </g>

    <!-- Notch -->
    <rect x="-40" y="-242" width="80" height="8" rx="4" fill="#1a1a2e"/>
  </g>

  <!-- Phone 2 (left, smaller, tilted) -->
  <g transform="translate(310, 380) rotate(-8)" filter="url(#phoneshadow)" opacity="0.5">
    <rect x="-90" y="-165" width="180" height="330" rx="20" fill="#1a1a2e"/>
    <rect x="-78" y="-148" width="156" height="296" rx="6" fill="white"/>
    <!-- Simplified content -->
    <rect x="-78" y="-148" width="156" height="24" fill="#f8f8f8"/>
    <line x1="-58" y1="-110" x2="58" y2="-110" stroke="#eee" stroke-width="2" stroke-linecap="round"/>
    <line x1="-58" y1="-95" x2="40" y2="-95" stroke="#eee" stroke-width="2" stroke-linecap="round"/>
    <line x1="-58" y1="-80" x2="50" y2="-80" stroke="#eee" stroke-width="2" stroke-linecap="round"/>
    <rect x="-58" y="-72" width="90" height="12" rx="2" fill="#FF2D55" opacity="0.1"/>
    <line x1="-58" y1="-65" x2="25" y2="-65" stroke="#FF2D55" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <line x1="-58" y1="-50" x2="58" y2="-50" stroke="#eee" stroke-width="2" stroke-linecap="round"/>
    <line x1="-58" y1="-35" x2="35" y2="-35" stroke="#eee" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Phone 3 (right, smaller, tilted) -->
  <g transform="translate(890, 380) rotate(8)" filter="url(#phoneshadow)" opacity="0.5">
    <rect x="-90" y="-165" width="180" height="330" rx="20" fill="#1a1a2e"/>
    <rect x="-78" y="-148" width="156" height="296" rx="6" fill="white"/>
    <!-- Simplified content -->
    <rect x="-78" y="-148" width="156" height="24" fill="#f8f8f8"/>
    <line x1="-58" y1="-110" x2="58" y2="-110" stroke="#eee" stroke-width="2" stroke-linecap="round"/>
    <line x1="-58" y1="-95" x2="40" y2="-95" stroke="#eee" stroke-width="2" stroke-linecap="round"/>
    <rect x="-58" y="-87" width="100" height="12" rx="2" fill="#00D4D4" opacity="0.1"/>
    <line x1="-58" y1="-80" x2="35" y2="-80" stroke="#00D4D4" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <line x1="-58" y1="-65" x2="50" y2="-65" stroke="#eee" stroke-width="2" stroke-linecap="round"/>
    <line x1="-58" y1="-50" x2="58" y2="-50" stroke="#eee" stroke-width="2" stroke-linecap="round"/>
    <line x1="-58" y1="-35" x2="30" y2="-35" stroke="#eee" stroke-width="2" stroke-linecap="round"/>
    <!-- Comment thread -->
    <g transform="translate(40, -80)">
      <rect x="0" y="-8" width="30" height="16" rx="8" fill="#00D4D4" opacity="0.8"/>
      <text x="15" y="4" text-anchor="middle" font-family="sans-serif" font-size="7" fill="white">+3</text>
    </g>
  </g>

  <!-- Title -->
  <text x="600" y="710" text-anchor="middle" font-family="monospace" font-size="28" font-weight="700" fill="#1a1a2e" letter-spacing="6" opacity="0.8">WE-READER</text>
  <text x="600" y="740" text-anchor="middle" font-family="monospace" font-size="12" fill="#1a1a2e" letter-spacing="3" opacity="0.35">TIKTOK BOOKS</text>
</svg>
