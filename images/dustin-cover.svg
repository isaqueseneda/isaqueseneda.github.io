<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none">
  <defs>
    <radialGradient id="spotlight" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#4a3520"/>
      <stop offset="60%" stop-color="#2a1f14"/>
      <stop offset="100%" stop-color="#1a1209"/>
    </radialGradient>
    <radialGradient id="dustglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4b896" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4b896" stop-opacity="0"/>
    </radialGradient>
    <filter id="fuzzy">
      <feTurbulence type="fractalNoise" baseFrequency="0.08" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#spotlight)"/>

  <!-- Floor -->
  <rect x="0" y="520" width="1200" height="280" fill="#3d2b1a" opacity="0.5"/>
  <line x1="0" y1="520" x2="1200" y2="520" stroke="#5a4030" stroke-width="1" opacity="0.4"/>

  <!-- Floor planks -->
  <line x1="200" y1="520" x2="180" y2="800" stroke="#5a4030" stroke-width="0.5" opacity="0.2"/>
  <line x1="500" y1="520" x2="490" y2="800" stroke="#5a4030" stroke-width="0.5" opacity="0.2"/>
  <line x1="780" y1="520" x2="800" y2="800" stroke="#5a4030" stroke-width="0.5" opacity="0.2"/>
  <line x1="1050" y1="520" x2="1070" y2="800" stroke="#5a4030" stroke-width="0.5" opacity="0.2"/>

  <!-- Dust particles floating -->
  <circle cx="300" cy="200" r="2" fill="#d4b896" opacity="0.3">
    <animate attributeName="cy" values="200;180;200" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="850" cy="300" r="1.5" fill="#d4b896" opacity="0.2">
    <animate attributeName="cy" values="300;280;300" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="150" r="1" fill="#d4b896" opacity="0.25">
    <animate attributeName="cy" values="150;135;150" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="350" r="1.8" fill="#d4b896" opacity="0.15">
    <animate attributeName="cy" values="350;335;350" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- DUSTIN - the dust bunny character -->
  <g transform="translate(520, 420)" filter="url(#shadow)">
    <!-- Glow beneath -->
    <ellipse cx="0" cy="90" rx="55" ry="12" fill="url(#dustglow)"/>

    <!-- Body - fuzzy ball shape -->
    <g filter="url(#fuzzy)">
      <ellipse cx="0" cy="30" rx="42" ry="48" fill="#b8a088"/>
      <ellipse cx="0" cy="30" rx="38" ry="44" fill="#c4ad94"/>
    </g>

    <!-- Fuzzy tufts -->
    <circle cx="-30" cy="10" r="12" fill="#b8a088" opacity="0.8"/>
    <circle cx="28" cy="5" r="14" fill="#c4ad94" opacity="0.7"/>
    <circle cx="-25" cy="55" r="10" fill="#b8a088" opacity="0.6"/>
    <circle cx="22" cy="50" r="11" fill="#b8a088" opacity="0.7"/>
    <circle cx="0" cy="-15" r="15" fill="#c4ad94" opacity="0.6"/>
    <circle cx="-18" cy="-10" r="8" fill="#d4c0a8" opacity="0.5"/>
    <circle cx="15" cy="-8" r="9" fill="#d4c0a8" opacity="0.4"/>

    <!-- Hair strands -->
    <line x1="-10" y1="-20" x2="-15" y2="-35" stroke="#b8a088" stroke-width="2" stroke-linecap="round"/>
    <line x1="5" y1="-22" x2="8" y2="-38" stroke="#c4ad94" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="15" y1="-18" x2="22" y2="-30" stroke="#b8a088" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Eyes - big, scared -->
    <ellipse cx="-14" cy="20" rx="12" ry="14" fill="white"/>
    <ellipse cx="14" cy="20" rx="12" ry="14" fill="white"/>
    <circle cx="-10" cy="22" r="7" fill="#1a1209"/>
    <circle cx="18" cy="22" r="7" fill="#1a1209"/>
    <circle cx="-8" cy="19" r="2.5" fill="white"/>
    <circle cx="20" cy="19" r="2.5" fill="white"/>

    <!-- Mouth - scared open -->
    <ellipse cx="2" cy="48" rx="10" ry="8" fill="#3d2010"/>
    <ellipse cx="2" cy="45" rx="8" ry="4" fill="#5a3020"/>

    <!-- Tiny legs running -->
    <line x1="-15" y1="75" x2="-25" y2="88" stroke="#b8a088" stroke-width="4" stroke-linecap="round">
      <animate attributeName="x2" values="-25;-10;-25" dur="0.3s" repeatCount="indefinite"/>
    </line>
    <line x1="15" y1="75" x2="25" y2="88" stroke="#b8a088" stroke-width="4" stroke-linecap="round">
      <animate attributeName="x2" values="25;10;25" dur="0.3s" repeatCount="indefinite" begin="0.15s"/>
    </line>
  </g>

  <!-- Vacuum cleaner silhouette approaching from right -->
  <g transform="translate(850, 380)" opacity="0.7">
    <!-- Vacuum head -->
    <rect x="-60" y="100" width="140" height="35" rx="5" fill="#2d2d2d"/>
    <rect x="-55" y="95" width="130" height="10" rx="3" fill="#3d3d3d"/>
    <!-- Vacuum tube going up -->
    <rect x="25" y="20" width="12" height="80" rx="6" fill="#3d3d3d" transform="rotate(-8, 31, 60)"/>
    <!-- Handle -->
    <rect x="15" y="0" width="8" height="30" rx="4" fill="#4d4d4d" transform="rotate(-8, 19, 15)"/>
    <!-- Suction effect -->
    <line x1="-70" y1="115" x2="-100" y2="112" stroke="#d4b896" stroke-width="1" opacity="0.3" stroke-dasharray="4 6">
      <animate attributeName="x2" values="-100;-70" dur="0.5s" repeatCount="indefinite"/>
    </line>
    <line x1="-70" y1="120" x2="-110" y2="118" stroke="#d4b896" stroke-width="0.8" opacity="0.2" stroke-dasharray="3 5">
      <animate attributeName="x2" values="-110;-70" dur="0.4s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Title -->
  <text x="600" y="730" text-anchor="middle" font-family="monospace" font-size="28" font-weight="700" fill="#d4b896" letter-spacing="6" opacity="0.8">RUN, DUSTIN!</text>
  <text x="600" y="760" text-anchor="middle" font-family="monospace" font-size="12" fill="#d4b896" letter-spacing="3" opacity="0.4">VORWERK</text>
</svg>
